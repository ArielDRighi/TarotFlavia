<svg xmlns="http://www.w3.org/2000/svg" width="400" height="225" viewBox="0 0 400 225">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="225" fill="#1e1b4b"/>
  <rect width="400" height="225" fill="url(#bg)"/>
  
  <!-- Moon icon -->
  <g transform="translate(200, 112.5)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="55" fill="#a78bfa" opacity="0.2"/>
    <!-- Moon -->
    <circle cx="0" cy="0" r="40" fill="#c4b5fd"/>
    <circle cx="15" cy="0" r="35" fill="#1e1b4b"/>
    <!-- Stars -->
    <circle cx="-60" cy="-30" r="2" fill="#fbbf24"/>
    <circle cx="65" cy="-25" r="1.5" fill="#fbbf24"/>
    <circle cx="-50" cy="40" r="1" fill="#fbbf24"/>
    <circle cx="55" cy="35" r="2" fill="#fbbf24"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="190" font-family="serif" font-size="18" fill="#c4b5fd" text-anchor="middle" opacity="0.8">
    Ritual Espiritual
  </text>
</svg>
