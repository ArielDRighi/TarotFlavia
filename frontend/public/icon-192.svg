<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="#805AD5"/>
  
  <!-- Centered Moon and Stars -->
  <g transform="translate(96, 96)">
    <!-- Crescent Moon -->
    <path d="M-15 -40 C-15 -15 -30 5 -50 5 C-45 5 -40 3 -36 0 C-24 -8 -15 -23 -15 -40 Z" 
          fill="#F9F7F2" opacity="0.95"/>
    
    <!-- Stars around moon -->
    <circle cx="-5" cy="-30" r="3" fill="#D69E2E"/>
    <circle cx="10" cy="-25" r="2" fill="#D69E2E"/>
    <circle cx="-10" cy="-15" r="2.5" fill="#D69E2E"/>
    
    <!-- Mystical symbol -->
    <g transform="translate(0, 20)">
      <circle cx="0" cy="0" r="20" stroke="#F9F7F2" stroke-width="2" fill="none"/>
      <path d="M0 -25 L0 25" stroke="#F9F7F2" stroke-width="2"/>
      <path d="M-25 0 L25 0" stroke="#F9F7F2" stroke-width="2"/>
      <circle cx="0" cy="0" r="5" fill="#D69E2E"/>
    </g>
  </g>
</svg>
