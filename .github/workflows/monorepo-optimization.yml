name: CI - Optimized Monorepo

# Workflow optimizado para monorepo con detección de cambios
# Solo ejecuta los tests de los workspaces que cambiaron
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

# Permisos necesarios para dorny/paths-filter
permissions:
  contents: read
  pull-requests: read

# Cancelar ejecuciones anteriores del mismo workflow en el mismo branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # JOB 1: Detectar cambios en workspaces
  # ============================================================================
  detect-changes:
    name: Detect Changed Workspaces
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      root: ${{ steps.filter.outputs.root }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            root:
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/**'

  # ============================================================================
  # Backend Jobs - Solo si hubo cambios
  # ============================================================================
  backend-quality:
    name: Backend Quality Checks
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.root == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint & Format
        working-directory: ./backend/tarot-app
        run: |
          npm run lint
          npm run format -- --check

      - name: Type Check
        working-directory: ./backend/tarot-app
        run: npx tsc --noEmit

      - name: Validate Architecture
        working-directory: ./backend/tarot-app
        run: node scripts/validate-architecture.js

      - name: Build
        working-directory: ./backend/tarot-app
        run: npm run build

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, backend-quality]
    if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.root == 'true'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tarot_test_user
          POSTGRES_PASSWORD: tarot_test_pass
          POSTGRES_DB: tarot_test
        ports:
          - 5436:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        working-directory: ./backend/tarot-app
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5436
          POSTGRES_USER: tarot_test_user
          POSTGRES_PASSWORD: tarot_test_pass
          POSTGRES_DB: tarot_test
          TAROT_DB_HOST: localhost
          TAROT_DB_PORT: 5436
          TAROT_DB_USER: tarot_test_user
          TAROT_DB_PASSWORD: tarot_test_pass
          TAROT_DB_NAME: tarot_test
          TAROT_E2E_DB_HOST: localhost
          TAROT_E2E_DB_PORT: 5436
          TAROT_E2E_DB_USER: tarot_test_user
          TAROT_E2E_DB_PASSWORD: tarot_test_pass
          TAROT_E2E_DB_NAME: tarot_test
          TAROT_INTEGRATION_DB_HOST: localhost
          TAROT_INTEGRATION_DB_PORT: 5436
          TAROT_INTEGRATION_DB_USER: tarot_test_user
          TAROT_INTEGRATION_DB_PASSWORD: tarot_test_pass
          TAROT_INTEGRATION_DB_NAME: tarot_test
          INTEGRATION_TESTING: true
          JWT_SECRET: test-jwt-secret-for-ci-only-minimum-32-characters-required
          JWT_EXPIRES_IN: 1h
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NODE_ENV: test
        run: npm run migration:run

      - name: Seed database with test data
        working-directory: ./backend/tarot-app
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5436
          POSTGRES_USER: tarot_test_user
          POSTGRES_PASSWORD: tarot_test_pass
          POSTGRES_DB: tarot_test
          TAROT_DB_HOST: localhost
          TAROT_DB_PORT: 5436
          TAROT_DB_USER: tarot_test_user
          TAROT_DB_PASSWORD: tarot_test_pass
          TAROT_DB_NAME: tarot_test
          TAROT_INTEGRATION_DB_HOST: localhost
          TAROT_INTEGRATION_DB_PORT: 5436
          TAROT_INTEGRATION_DB_USER: tarot_test_user
          TAROT_INTEGRATION_DB_PASSWORD: tarot_test_pass
          TAROT_INTEGRATION_DB_NAME: tarot_test
          INTEGRATION_TESTING: true
          JWT_SECRET: test-jwt-secret-for-ci-only-minimum-32-characters-required
          JWT_EXPIRES_IN: 1h
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NODE_ENV: test
        run: npm run seed

      - name: Run tests
        working-directory: ./backend/tarot-app
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5436
          POSTGRES_USER: tarot_test_user
          POSTGRES_PASSWORD: tarot_test_pass
          POSTGRES_DB: tarot_test
          TAROT_DB_HOST: localhost
          TAROT_DB_PORT: 5436
          TAROT_DB_USER: tarot_test_user
          TAROT_DB_PASSWORD: tarot_test_pass
          TAROT_DB_NAME: tarot_test
          TAROT_E2E_DB_HOST: localhost
          TAROT_E2E_DB_PORT: 5436
          TAROT_E2E_DB_USER: tarot_test_user
          TAROT_E2E_DB_PASSWORD: tarot_test_pass
          TAROT_E2E_DB_NAME: tarot_test
          TAROT_INTEGRATION_DB_HOST: localhost
          TAROT_INTEGRATION_DB_PORT: 5436
          TAROT_INTEGRATION_DB_USER: tarot_test_user
          TAROT_INTEGRATION_DB_PASSWORD: tarot_test_pass
          TAROT_INTEGRATION_DB_NAME: tarot_test
          INTEGRATION_TESTING: true
          JWT_SECRET: test-jwt-secret-for-ci-only-minimum-32-characters-required
          JWT_EXPIRES_IN: 1h
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: sk-test-key-for-ci-only-not-real-12345
          DEEPSEEK_API_KEY: sk-test-key-for-ci-only-not-real-12345
          NODE_ENV: test
          PORT: 3000
          CI: true
        run: npm run test -- --coverage

      - name: Upload coverage
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/tarot-app/coverage/lcov.info
          flags: backend
          name: backend-coverage

  # ============================================================================
  # Frontend Jobs - Solo si hubo cambios
  # ============================================================================
  frontend-quality:
    name: Frontend Quality Checks
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.root == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check if frontend exists
        id: check-frontend
        run: |
          if [ -f "./frontend/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ Frontend not initialized yet, skipping checks"
          fi

      - name: Lint & Format
        if: steps.check-frontend.outputs.exists == 'true'
        working-directory: ./frontend
        run: |
          npm run lint || echo "⚠️ ESLint not configured yet"
          npm run format -- --check || echo "⚠️ Prettier not configured yet"
        continue-on-error: true

      - name: Type Check
        if: steps.check-frontend.outputs.exists == 'true'
        working-directory: ./frontend
        run: npx tsc --noEmit || echo "⚠️ TypeScript not configured yet"
        continue-on-error: true

      - name: Validate Architecture
        if: steps.check-frontend.outputs.exists == 'true'
        working-directory: ./frontend
        run: node scripts/validate-architecture.js || echo "⚠️ Architecture validation not configured yet"
        continue-on-error: true

      - name: Build
        if: steps.check-frontend.outputs.exists == 'true'
        working-directory: ./frontend
        run: npm run build || echo "⚠️ Build not configured yet"
        continue-on-error: true

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, frontend-quality]
    if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.root == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check if frontend exists
        id: check-frontend
        run: |
          if [ -f "./frontend/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        if: steps.check-frontend.outputs.exists == 'true'
        working-directory: ./frontend
        env:
          CI: true
        run: npm run test -- --coverage --run || echo "⚠️ Tests not configured yet"
        continue-on-error: true

      - name: Upload coverage
        if: steps.check-frontend.outputs.exists == 'true' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage

  # ============================================================================
  # Summary
  # ============================================================================
  ci-optimized-success:
    name: CI Optimized Success
    runs-on: ubuntu-latest
    needs:
      [
        detect-changes,
        backend-quality,
        backend-tests,
        frontend-quality,
        frontend-tests,
      ]
    if: always()

    steps:
      - name: CI Summary
        run: |
          echo "📊 CI Pipeline Summary (Optimized Monorepo)"
          echo ""
          echo "Changed Workspaces:"
          echo "- Backend: ${{ needs.detect-changes.outputs.backend }}"
          echo "- Frontend: ${{ needs.detect-changes.outputs.frontend }}"
          echo "- Root: ${{ needs.detect-changes.outputs.root }}"
          echo ""
          echo "Job Results:"
          echo "- Backend Quality: ${{ needs.backend-quality.result }}"
          echo "- Backend Tests: ${{ needs.backend-tests.result }}"
          echo "- Frontend Quality: ${{ needs.frontend-quality.result }}"
          echo "- Frontend Tests: ${{ needs.frontend-tests.result }}"

      - name: Check for failures
        if: |
          needs.backend-quality.result == 'failure' ||
          needs.backend-tests.result == 'failure' ||
          needs.frontend-quality.result == 'failure' ||
          needs.frontend-tests.result == 'failure'
        run: |
          echo "❌ Some jobs failed"
          exit 1

      - name: Success
        if: |
          needs.backend-quality.result != 'failure' &&
          needs.backend-tests.result != 'failure' &&
          needs.frontend-quality.result != 'failure' &&
          needs.frontend-tests.result != 'failure'
        run: echo "✅ All enabled jobs passed!"
