name: Architecture Validation

# Workflow disabled - run manually when needed
# Use: gh workflow run architecture-validation.yml or run checks locally
on:
  workflow_dispatch: # Manual trigger only
  # pull_request:
  #   branches: [develop, main]
  #   paths:
  #     - "backend/tarot-app/src/**"
  #     - "backend/tarot-app/test/**"
  #     - "backend/tarot-app/package.json"
  #     - "frontend/app/**"
  #     - "frontend/components/**"
  #     - "frontend/hooks/**"
  #     - "frontend/lib/**"
  #     - "frontend/package.json"

jobs:
  # ============================================================================
  # Backend Architecture Validation
  # ============================================================================
  validate-backend-architecture:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/tarot-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/tarot-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate module structure
        run: node scripts/validate-architecture.js

      - name: Check circular dependencies
        run: |
          npm install -g madge
          madge --circular --extensions ts --exclude '\.module\.ts$' src/ && echo "✅ No circular dependencies in non-module files"

      - name: Run linter
        run: npm run lint

      - name: Run build
        run: npm run build

      - name: Run tests with coverage
        run: npm run test:cov

      - name: Check coverage threshold
        run: |
          COVERAGE=$(node -pe "require('./coverage/coverage-summary.json').total.lines.pct")
          echo "Coverage: $COVERAGE%"
          if awk "BEGIN {exit !($COVERAGE < 80)}"; then
            echo "❌ Coverage below 80%: $COVERAGE%"
            exit 1
          fi

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/tarot-app/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # ============================================================================
  # Frontend Architecture Validation
  # ============================================================================
  validate-frontend-architecture:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"

      - name: Check if frontend exists
        id: check-frontend
        run: |
          if [ -f "./package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ Frontend not initialized yet, skipping validation"
          fi

      - name: Install dependencies
        if: steps.check-frontend.outputs.exists == 'true'
        run: |
          cd ..
          npm ci

      - name: Validate architecture
        if: steps.check-frontend.outputs.exists == 'true'
        run: node scripts/validate-architecture.js

      - name: Run linter
        if: steps.check-frontend.outputs.exists == 'true'
        run: npm run lint

      - name: Type check
        if: steps.check-frontend.outputs.exists == 'true'
        run: npx tsc --noEmit

      - name: Run build
        if: steps.check-frontend.outputs.exists == 'true'
        run: npm run build

      - name: Run tests with coverage
        if: steps.check-frontend.outputs.exists == 'true'
        run: npm run test -- --coverage --run

      - name: Check coverage threshold
        if: steps.check-frontend.outputs.exists == 'true'
        run: |
          COVERAGE=$(node -pe "require('./coverage/coverage-summary.json').total.lines.pct")
          echo "Coverage: $COVERAGE%"
          if awk "BEGIN {exit !($COVERAGE < 80)}"; then
            echo "❌ Coverage below 80%: $COVERAGE%"
            exit 1
          fi

      - name: Upload coverage reports
        if: steps.check-frontend.outputs.exists == 'true'
        uses: codecov/codecov-action@v3
        with:
          files: ./frontend/coverage/lcov.info
          flags: frontend-unittests
          name: frontend-codecov
          fail_ci_if_error: false
